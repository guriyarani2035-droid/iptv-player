<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium IPTV Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --primary-color: #E50914;
            --card-bg: #161616;
            --text-main: #FFFFFF;
            --text-sub: #888888;
            --border-color: #242424;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Utility Styles for Smooth UI */
        .hidden { display: none !important; }

        /* Login Screen Design */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-sub);
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: #b80710;
        }

        /* Premium Dashboard Layout (XCIPTV Style) */
        .dashboard-container {
            padding: 20px;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .dash-header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .header-actions button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* XCIPTV Main Grid */
        .xciptv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .grid-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .grid-item i {
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .grid-item div {
            font-size: 18px;
            font-weight: 600;
        }

        /* Quality Filters Panel */
        .quality-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .filter-btn.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* Content Display Lists */
        .content-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        .channel-card:hover {
            border-color: var(--primary-color);
        }

        .quality-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            color: #FFD700;
        }

        /* Settings Area Layout */
        .settings-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .settings-panel h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h2>IPTV PRESET LOGIN</h2>
            <div class="input-group">
                <label>Portal URL / DNS</label>
                <input type="text" id="portalUrl" value="http://example.com:8080" placeholder="http://domain.com:port">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>
            <button class="btn-primary" onclick="handleLogin()">CONNECT DASHBOARD</button>
        </div>
    </div>

    <div id="dashboardScreen" class="dashboard-container hidden">
        <div class="dash-header">
            <h1 id="appLogoTitle"><i class="fa-solid fa-tv"></i> XCIPTV CONTROL</h1>
            <div class="header-actions">
                <button onclick="switchScreen('settingsScreen')"><i class="fa-solid fa-gear"></i> Settings</button>
                <button onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </div>

        <div class="xciptv-grid">
            <div class="grid-item" onclick="loadContent('live')">
                <i class="fa-solid fa-satellite-dish"></i>
                <div>LIVE TV</div>
            </div>
            <div class="grid-item" onclick="loadContent('movies')">
                <i class="fa-solid fa-film"></i>
                <div>MOVIES</div>
            </div>
            <div class="grid-item" onclick="loadContent('series')">
                <i class="fa-solid fa-clapperboard"></i>
                <div>SERIES</div>
            </div>
            <div class="grid-item" onclick="loadContent('favorites')">
                <i class="fa-solid fa-heart"></i>
                <div>FAVORITES (3)</div>
            </div>
        </div>

        <div id="filterSection" class="hidden">
            <div class="quality-filters">
                <button class="filter-btn active" onclick="filterQuality('ALL')">ALL QUALITY</button>
                <button class="filter-btn" onclick="filterQuality('SD')">SD</button>
                <button class="filter-btn" onclick="filterQuality('HD')">HD</button>
                <button class="filter-btn" onclick="filterQuality('FHD')">FHD</button>
                <button class="filter-btn" onclick="filterQuality('4K')">4K Ultra HD</button>
            </div>

            <div id="contentDisplayList" class="content-list"></div>
        </div>
    </div>

    <div id="settingsScreen" class="dashboard-container hidden">
        <div class="dash-header">
            <h1><i class="fa-solid fa-gear"></i> PREFERENCES CONFIG</h1>
            <div class="header-actions">
                <button onclick="switchScreen('dashboardScreen')"><i class="fa-solid fa-arrow-left"></i> Back</button>
            </div>
        </div>

        <div class="settings-panel">
            <h3>3 Preferred Countries Filter (Saves Bandwidth)</h3>
            <div class="input-group">
                <label>Country Preference 1</label>
                <input type="text" id="country1" placeholder="e.g. Pakistan, UK, India">
            </div>
            <div class="input-group">
                <label>Country Preference 2</label>
                <input type="text" id="country2" placeholder="e.g. USA, Canada">
            </div>
            <div class="input-group">
                <label>Country Preference 3</label>
                <input type="text" id="country3" placeholder="e.g. Sports, Kids">
            </div>
            
            <h3 style="margin-top:30px;">Favorite Playlists Initialization</h3>
            <div class="input-group">
                <label>Active Favorite Slots Configuration</label>
                <p style="color:var(--text-sub); font-size:13px; margin:0 0 10px 0;">3 Separate lists generated automatically (Fav List 1, Fav List 2, Fav List 3).</p>
            </div>
            <button class="btn-primary" onclick="saveSettings()">SAVE SYSTEM PARAMETERS</button>
        </div>
    </div>

    <script>
        let allChannelsRawData = [];
        let currentActiveQuality = 'ALL';

        function switchScreen(screenId) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('settingsScreen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function handleLogin() {
            // Simulated login routing to load clean performance layout
            switchScreen('dashboardScreen');
            // Mock data generation for hardware testing (SD, HD, FHD, 4K distribution)
            generateMockData();
        }

        function generateMockData() {
            allChannelsRawData = [
                { name: "ARY Digital SD", category: "live", quality: "SD" },
                { name: "GEO News HD", category: "live", quality: "HD" },
                { name: "Ptv Sports FHD", category: "live", quality: "FHD" },
                { name: "Ten Sports 4K", category: "live", quality: "4K" },
                { name: "Action Movie Ultra HD 4K", category: "movies", quality: "4K" },
                { name: "Comedy Film HD", category: "movies", quality: "HD" },
                { name: "Drama Series SD Blockbuster", category: "series", quality: "SD" }
            ];
        }

        function loadContent(type) {
            document.getElementById('filterSection').classList.remove('hidden');
            renderList(type, 'ALL');
        }

        function filterQuality(quality) {
            currentActiveQuality = quality;
            // Manage UI active classes
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderList('live', quality); // Default rendering switch
        }

        function renderList(category, qualityFilter) {
            const container = document.getElementById('contentDisplayList');
            container.innerHTML = '';

            let filtered = allChannelsRawData;
            if (category !== 'favorites') {
                filtered = allChannelsRawData.filter(item => item.category === category);
            }

            if (qualityFilter !== 'ALL') {
                filtered = filtered.filter(item => item.quality === qualityFilter);
            }

            if(filtered.length === 0) {
                container.innerHTML = `<p style="color:var(--text-sub); grid-column: 1/-1;">No streams found matching ${qualityFilter} resolution.</p>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="quality-badge">${item.quality}</div>
                    <i class="fa-solid fa-play-circle" style="font-size:32px; color:var(--primary-color); margin-bottom:10px;"></i>
                    <div style="font-size:14px; font-weight:bold;">${item.name}</div>
                `;
                container.appendChild(card);
            });
        }

        function saveSettings() {
            const c1 = document.getElementById('country1').value;
            const c2 = document.getElementById('country2').value;
            const c3 = document.getElementById('country3').value;
            
            localStorage.setItem('pref_country_1', c1);
            localStorage.setItem('pref_country_2', c2);
            localStorage.setItem('pref_country_3', c3);
            
            alert('Preferences parameters loaded successfully! Hardware speed optimized.');
            switchScreen('dashboardScreen');
        }

        function logout() {
            switchScreen('loginScreen');
            document.getElementById('filterSection').classList.add('hidden');
        }
    </script>
</body>
</html>
